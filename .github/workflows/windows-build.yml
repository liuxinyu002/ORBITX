name: Windows Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Windows NSIS Installer
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: 获取 pnpm store 路径
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: 缓存 pnpm 依赖
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 缓存 Rust 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 Windows 安装包
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: 列出构建产物
        shell: bash
        run: |
          echo "=== target 目录结构 ==="
          find src-tauri/target -name "*.exe" -o -name "*.msi" 2>/dev/null | head -20 || echo "未找到 .exe 文件"
          echo "=== bundle 目录 ==="
          ls -R src-tauri/target/*/release/bundle/ 2>/dev/null || echo "未找到 bundle 目录"

      - name: 上传安装包 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbitx-windows-installer
          path: |
            src-tauri/target/**/release/bundle/nsis/*_x64-setup.exe
            src-tauri/target/**/release/bundle/msi/*_x64*.msi
          if-no-files-found: warn
