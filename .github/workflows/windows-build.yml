name: Windows Build

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Windows NSIS Installer
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: 获取 pnpm store 路径
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: 缓存 pnpm 依赖
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 缓存 Rust 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 同步版本号 (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "版本号: $VERSION"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json
          mv tmp.json src-tauri/tauri.conf.json
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: 构建 Windows 安装包
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target
        run: |
          rm -f src-tauri/target/release/bundle/nsis/OrbitX_*_x64-setup.exe
          pnpm tauri build --verbose

      - name: 上传安装包 artifacts (手动触发)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: orbitx-windows-installer
          path: src-tauri/target/release/bundle/nsis/OrbitX_*_x64-setup.exe
          if-no-files-found: error

      - name: 创建 Release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: OrbitX ${{ github.ref_name }}
          files: src-tauri/target/release/bundle/nsis/OrbitX_*_x64-setup.exe
          generate_release_notes: true

      - name: 清理旧标签 (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAGS=$(git tag -l 'v*' --sort=-v:refname | tail -n +4)
          for tag in $TAGS; do
            echo "删除旧标签: $tag"
            git push origin --delete "$tag" || true
          done
