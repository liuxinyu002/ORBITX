name: Windows 测试

on:
  workflow_dispatch:
  push:
    paths:
      - "src-tauri/src/**/*.rs"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
      - "src/**/*.ts"
      - "src/**/*.tsx"
      - "src/**/__test__/**"
      - ".github/workflows/windows-test.yml"

jobs:
  test-rust:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: 编译检查
        run: cargo test --no-run

      - name: 运行 Rust 单元测试
        id: run_tests
        continue-on-error: true
        run: cargo test --lib

      - name: 诊断缺失 DLL 入口点
        if: always() && (steps.run_tests.outcome == 'failure' || steps.run_tests.outcome == 'success')
        run: |
          python -m pip install pefile --quiet
          python ../scripts/diagnose_windows_imports.py "target/debug/deps/orbitx_lib-*.exe"

      - name: 报告测试失败
        if: steps.run_tests.outcome == 'failure'
        run: |
          Write-Host "::error::测试因 STATUS_ENTRYPOINT_NOT_FOUND 失败，详见上方诊断报告"
          exit 1

  test-frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 运行前端测试
        run: pnpm vitest run
