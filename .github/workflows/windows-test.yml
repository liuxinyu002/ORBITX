name: Windows 测试

on:
  workflow_dispatch:
  push:
    paths:
      - "src-tauri/src/**/*.rs"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
      - "src/**/*.ts"
      - "src/**/*.tsx"
      - "src/**/__test__/**"
      - ".github/workflows/windows-test.yml"

jobs:
  test-rust:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: 编译检查
        run: cargo test --no-run

      - name: 运行 Rust 单元测试
        id: run_tests
        continue-on-error: true
        run: cargo test --lib

      - name: 静态分析 PE 导入表
        if: always() && (steps.run_tests.outcome == 'failure' || steps.run_tests.outcome == 'success')
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -m pip install pefile --quiet
          python ../scripts/diagnose_windows_imports.py "target/debug/deps/orbitx_lib-*.exe"

      - name: 检查 Windows 应用事件日志 (Event Viewer)
        if: always() && steps.run_tests.outcome == 'failure'
        run: |
          Write-Host "=== 最近 50 条应用崩溃日志 (Provider=Application Error / EventId=1000) ==="
          $events = Get-WinEvent -LogName Application -MaxEvents 50 -ErrorAction SilentlyContinue `
            | Where-Object { $_.ProviderName -match "Application Error" -or $_.Id -eq 1000 }
          if ($events) {
            $events | ForEach-Object {
              Write-Host "--- $($_.TimeCreated) | EventId=$($_.Id) ---"
              Write-Host $_.Message
            }
          } else {
            Write-Host "(无匹配事件)"
          }

          Write-Host "`n=== 最近 20 条 WER 报告 (EventId=1001, 含故障模块名) ==="
          $wer = Get-WinEvent -LogName Application -MaxEvents 20 -ErrorAction SilentlyContinue `
            | Where-Object { $_.Id -eq 1001 }
          if ($wer) {
            $wer | ForEach-Object {
              Write-Host "--- $($_.TimeCreated) | Id=1001 ---"
              Write-Host $_.Message
            }
          } else {
            Write-Host "(无 WER 报告)"
          }

          Write-Host "`n=== 搜索包含 orbitx 的系统/应用日志 ==="
          $related = Get-WinEvent -LogName System -MaxEvents 200 -ErrorAction SilentlyContinue `
            | Where-Object { $_.Message -match "orbitx" }
          if (-not $related) {
            $related = Get-WinEvent -LogName Application -MaxEvents 200 -ErrorAction SilentlyContinue `
              | Where-Object { $_.Message -match "orbitx" }
          }
          if ($related) {
            $related | ForEach-Object {
              Write-Host "--- $($_.TimeCreated) | Log=$($_.LogName) | Id=$($_.Id) ---"
              Write-Host $_.Message
            }
          } else {
            Write-Host "(无匹配事件)"
          }

      - name: Python 调试器追踪加载器失败
        if: always() && steps.run_tests.outcome == 'failure'
        run: |
          Write-Host "=== Python 调试器: 使用 CreateProcess+DEBUG_PROCESS 捕获第一机会异常 ==="
          Write-Host ""
          python ../scripts/trace_loader_failure.py "target/debug/deps/orbitx_lib-*.exe" 2>&1

      - name: CDB 动态加载器诊断 (备用)
        if: always() && steps.run_tests.outcome == 'failure'
        run: |
          $binary = Get-ChildItem -Path "target/debug/deps/orbitx_lib-*.exe" `
            | Sort-Object LastWriteTime -Descending `
            | Select-Object -First 1
          if (-not $binary) {
            Write-Host "ERROR: 未找到测试二进制文件"
            exit 1
          }

          # 查找 CDB 安装路径
          $cdbPaths = @(
            "C:\Program Files (x86)\Windows Kits\10\Debuggers\x64\cdb.exe",
            "${env:ProgramFiles(x86)}\Windows Kits\10\Debuggers\x64\cdb.exe"
          )
          $cdb = $null
          foreach ($p in $cdbPaths) {
            if (Test-Path $p) { $cdb = $p; break }
          }
          if (-not $cdb) {
            Write-Host "CDB 不在预期路径，尝试搜索..."
            $cdb = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\Debuggers" -Recurse -Filter cdb.exe -ErrorAction SilentlyContinue `
              | Where-Object { $_.FullName -match 'x64' } `
              | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $cdb) {
            Write-Host "未找到 CDB，跳过"
            exit 0
          }

          Write-Host "=== CDB: $cdb ==="
          & $cdb `
            -c ".lastevent; .echo --- Call Stack ---; kn 20; .echo --- Modules ---; lm t; q" `
            $binary.FullName 2>&1

      - name: 报告测试失败
        if: steps.run_tests.outcome == 'failure'
        run: |
          Write-Host "::error::测试因 STATUS_ENTRYPOINT_NOT_FOUND 失败，详见上方诊断报告"
          exit 1

  test-frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 运行前端测试
        run: pnpm vitest run
